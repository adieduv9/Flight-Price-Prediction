<!DOCTYPE html>
<html>
<head>
    <title>Flight Fare Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #e3f2fd, #ffffff);">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center mb-4">✈ Flight Fare Prediction</h2>

        <form action="/predict" method="post">

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Airline</label>
                    <select class="form-select" name="airline" required>
                        <option disabled selected>Select Airline</option>
                        <option value="IndiGo">IndiGo</option>
                        <option value="Air_India">Air India</option>
                        <option value="Vistara">Vistara</option>
                        <option value="SpiceJet">SpiceJet</option>
                        <option value="GO_FIRST">GO FIRST</option>
                        <option value="AirAsia">AirAsia</option>
                    </select>
                </div>

                <div class="col">
                    <label class="form-label">Travel Class</label>
                    <select class="form-select" name="class" required>
                        <option disabled selected>Select Class</option>
                        <option value="Economy">Economy</option>
                        <option value="Business">Business</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Source City</label>
                    <select class="form-select" name="source_city" required>
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Hyderabad">Hyderabad</option>
                    </select>
                </div>

                <div class="col">
                    <label class="form-label">Destination City</label>
                    <select class="form-select" name="destination_city" required>
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Hyderabad">Hyderabad</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Departure Time Slot</label>
                    <select class="form-select" name="departure_time" required>
                        <option value="Early_Morning">Early Morning (4AM–8AM)</option>
                        <option value="Morning">Morning (8AM–12PM)</option>
                        <option value="Afternoon">Afternoon (12PM–4PM)</option>
                        <option value="Evening">Evening (4PM–8PM)</option>
                        <option value="Night">Night (8PM–12AM)</option>
                        <option value="Late_Night">Late Night (12AM–4AM)</option>
                    </select>
                </div>

                <div class="col">
                    <label class="form-label">Arrival Time Slot</label>
                    <select class="form-select" name="arrival_time" required>
                        <option value="Early_Morning">Early Morning</option>
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Evening">Evening</option>
                        <option value="Night">Night</option>
                        <option value="Late_Night">Late Night</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Number of Stops</label>
                    <select class="form-select" name="stops" required>
                        <option value="zero">Non-stop</option>
                        <option value="one">1 Stop</option>
                        <option value="two_or_more">2+ Stops</option>
                    </select>
                </div>

                <div class="col">
                    <label class="form-label">Flight Duration (Hours)</label>
                    <input type="number" step="0.1" class="form-control" 
                           name="duration" placeholder="Example: 2.5" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Days Until Departure
                </label>
                <input type="number" class="form-control" 
                       name="days_left" placeholder="How many days from today?" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary px-4">
                    Predict Fare
                </button>
            </div>

        </form>

        {% if prediction_text %}
        <div class="alert alert-success text-center mt-4">
            <strong>{{ prediction_text }}</strong>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
